name: Python Tests

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  test:

    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn streamlit requests paho-mqtt pytest pandas httpx

      - name: Run Test Suite
        run: |
          python -m pytest -v